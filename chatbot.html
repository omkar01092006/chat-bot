<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Serenity · Mood Companion</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Animated starfield background -->
    <div class="starfield" id="starfield"></div>
    <div class="aurora"></div>

    <div class="app-shell">

        <!-- Left Panel -->
        <aside class="left-panel">
            <div class="brand">
                <div class="moon-icon">🌙</div>
                <h1 class="brand-name">Serenity</h1>
                <p class="brand-tagline">Your Mood Companion</p>
            </div>

            <!-- Mood Picker -->
            <div class="mood-picker-section">
                <p class="panel-label">How are you feeling?</p>
                <div class="mood-grid" id="moodGrid">
                    <button class="mood-chip" data-mood="happy"    onclick="logMood('happy')">😊 Happy</button>
                    <button class="mood-chip" data-mood="calm"     onclick="logMood('calm')">😌 Calm</button>
                    <button class="mood-chip" data-mood="neutral"  onclick="logMood('neutral')">😐 Neutral</button>
                    <button class="mood-chip" data-mood="grateful" onclick="logMood('grateful')">🙏 Grateful</button>
                    <button class="mood-chip" data-mood="excited"  onclick="logMood('excited')">🤩 Excited</button>
                    <button class="mood-chip" data-mood="anxious"  onclick="logMood('anxious')">😰 Anxious</button>
                    <button class="mood-chip" data-mood="sad"      onclick="logMood('sad')">😢 Sad</button>
                    <button class="mood-chip" data-mood="stressed" onclick="logMood('stressed')">😤 Stressed</button>
                    <button class="mood-chip" data-mood="tired"    onclick="logMood('tired')">😴 Tired</button>
                    <button class="mood-chip" data-mood="angry"    onclick="logMood('angry')">😠 Angry</button>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="quick-actions">
                <p class="panel-label">Quick Actions</p>
                <button class="action-btn" onclick="quickSend('breathing')">🫁 Breathing Exercise</button>
                <button class="action-btn" onclick="quickSend('strategies')">💡 Coping Strategies</button>
                <button class="action-btn" onclick="quickSend('affirm')">✨ Affirmation</button>
                <button class="action-btn" onclick="quickSend('summary')">📊 My Mood Log</button>
            </div>

            <!-- Live Mood Log -->
            <div class="mini-log" id="miniLog">
                <p class="panel-label">Today's Log</p>
                <div class="log-entries" id="logEntries">
                    <p class="empty-log">No entries yet</p>
                </div>
            </div>
        </aside>

        <!-- Chat Main -->
        <main class="chat-main">
            <header class="chat-top">
                <div class="chat-top-left">
                    <span class="online-ring"></span>
                    <span class="online-label">Serenity is here for you</span>
                </div>
                <div class="chat-top-right">
                    <span class="log-counter" id="logCounter">0 entries today</span>
                </div>
            </header>

            <div class="messages" id="messages"></div>

            <footer class="chat-footer">
                <div class="input-wrap">
                    <textarea
                        id="userInput"
                        class="chat-textarea"
                        placeholder="Share how you're feeling, or just say hello…"
                        rows="1"
                        onkeydown="handleKey(event)"
                        oninput="autoResize(this)"
                    ></textarea>
                    <button class="send-btn" onclick="sendMessage()" title="Send">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 2L11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
                <p class="footer-hint">Try: "I feel anxious", "help me breathe", "show my mood log"</p>
            </footer>
        </main>

    </div>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
